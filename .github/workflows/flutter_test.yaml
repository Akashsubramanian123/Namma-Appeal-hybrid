name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Java (Required for Flutter)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Complex Secrets File
        run: |
          cat << 'EOF' > lib/secrets.dart
          class Secrets {
            static const supabaseUrl = "${{ secrets.SUPABASE_URL }}";
            static const supabaseAnonKey = "${{ secrets.SUPABASE_ANON_KEY }}";
            static const String groqApiKey = "${{ secrets.GROQ_API_KEY }}";
            static const openRouterKey = "${{ secrets.OPEN_ROUTER_KEY }}";
            static const String webClientId = "${{ secrets.WEB_CLIENT_ID }}";
            
            static const List<String> _geminiApiKeys = [
              "${{ secrets.GEMINI_KEY_1 }}",
              "${{ secrets.GEMINI_KEY_2 }}",
              "${{ secrets.GEMINI_KEY_3 }}",
              "${{ secrets.GEMINI_KEY_4 }}",
            ];
            
            static int _currentIndex = 0;
            
            static String get geminiApiKey {
              if (_geminiApiKeys.isEmpty) return '';
              final key = _geminiApiKeys[_currentIndex];
              _currentIndex = (_currentIndex + 1) % _geminiApiKeys.length;
              return key;
            }
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Run automated tests
        run: flutter test
      # --- NEW STEPS FOR PYTHON E2E EXCEL REPORT ---
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          cd e2e_tests
          pip install -r requirements.txt

      - name: Run E2E Tests & Generate Report
        run: |
          cd e2e_tests
          python run_tests.py

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: E2E-Test-Report
          path: e2e_tests/reports/e2e_test_report.xlsx
      # --- NEW STEPS FOR FLUTTER WEB DEPLOYMENT ---
      - name: Build Flutter Web App
        # The base-href MUST match your exact repository name!
        run: flutter build web --base-href "/Namma-Appeal-hybrid/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web